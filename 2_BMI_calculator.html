<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="2.css">
</head>
<body>
    <div class="container">
    <h3>BMI Calculator</h3>
    <form class="form">
        <label>Height in Cm</label>
        <input type="number" required class="ht"><br><br>
        <label>Weight in Kg</label>
        <input type="number" required class="wt"><br><br>
        <button type="submit" class="calculate">Calculate</button><br><br>
        <div id="result"></div>
    </form>
    <div>
        <h4>BMI Weight Guide</h4>
        <p>Under Weight = Less than 18.6 <br>
            Normal Range = 18.6 to 24.9 <br>
            Overweigth = Greater than 24.9
        </p>
    </div>
    </div>
</body>
<script src="2.js"></script>
</html>
